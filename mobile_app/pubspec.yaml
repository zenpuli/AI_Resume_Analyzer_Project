name: mobile_app
description: "AI Resume Analyzer - Professional Web Edition"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # 🚀 THE BIG UPGRADE: All these must be in the 3.x/5.x/5.x family
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  
  # 📄 PDF & WEB SUPPORT
  pdf: ^3.11.3
  printing: ^5.14.2
  
  # 🌐 UTILITIES
  file_picker: ^6.1.1
  http: ^1.2.0
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true